<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping site for Mobiles</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://th.bing.com/th/id/OIP.RH6B5bA4OtV54kFaybVENgHaHa?w=164&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      />
</head>
<body>
    <header>
        <nav>
            <section id="top-nav">
                <div class="top-nav-left">
                    <button class="btn" style="background-color: rgb(242, 206, 60);"><strong>Flipkart</strong></button>
                    <button class="btn">✈️<strong>Travel</strong></button>
                </div>
                <div class="top-nav-right">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>Location: Vadodara</p>
                </div>
            </section>
            <section class="bottom-nav">
                <div class="input-box">
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(154, 150, 150);" ></i>
                <input type="text" placeholder=" Search for Products, Brands and More">
                </div>

                <div class="options">
                    <div>
                    <i class="fa-regular fa-circle-user"></i>
                    <select name="user" id="user">
                        <option value="null">Login</option>
                    </select>
                    </div>
                    <div>
                        <select name="more" id="more">
                            <option value="null">More</option>
                        </select>
                    </div>
                    <div>
                    <i class="fa-solid fa-cart-shopping" ></i>
                    Cart
                    </div>
                    
                </div>
            </section>
            <hr>
            <section class="icons-box">
                <div class="box-item">
                    <i class="fa-solid fa-bag-shopping" style="color: rgb(66, 65, 65);">

                </i>
                <p>For You</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-shirt" style="color: rgb(66, 65, 65);"></i>
                    <p>Fashion</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-mobile-screen" style="color: rgb(66, 65, 65);"></i>
                    <p>Mobiles</p>
                </div>
                <div class="box-item">💄
                    <p>Beauty</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-display" style="color: rgb(66, 65, 65);"></i>
                    <p>Electronics</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-lightbulb" style="color: rgb(66, 65, 65);"></i>
                    <p>Home</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-tv" style="color: rgb(66, 65, 65);"></i>
                    <p>Appliances</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-cubes-stacked" style="color: rgb(66, 65, 65);"></i>
                    <p>Toys</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-bowl-rice" style="color: rgb(66, 65, 65);"></i>
                    <p>Food</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-helmet-un" style="color: rgb(66, 65, 65);"></i>
                    <p>Auto</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-motorcycle" style="color: rgb(66, 65, 65);"></i>
                    <p>2 wheeler</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-baseball-bat-ball" style="color: rgb(66, 65, 65);"></i>
                    <p>Sports</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-book" style="color: rgb(66, 65, 65);"></i>
                    <p>Books</p>
                </div>
                <div class="box-item">
                    <i class="fa-solid fa-couch" style="color: rgb(66, 65, 65);"></i>
                    <p>Furniture</p>
                </div>
            </section>
            <hr>
        </nav>
    </header>


    <main>

        <section id="ad-banner">
            <div class="ad-banners" id="banner-item1">
                <img class="img-1" src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/52dff66d7ee2e898.jpg?q=60" alt="">
            </div>
            <div class="ad-banners" id="banner-item2">
                <img class="img-1" src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/39b701f146ffde22.jpg?q=60" alt="">
            </div>
            <div class="ad-banners" id="banner-item3">
                <img id="img-2" src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/013f92d84dc27383.png?q=60" alt="">
            </div>
        </section>

        <section id="home-decor">
            <div class="heading">
                <h2>Home Decor & Furnishing</h2>
                <div id="arrow">
                    <i class="fa-solid fa-arrow-right" style="color: rgb(30, 48, 80);"></i>
                </div>
            </div>
            <div class="contain-decor">
                <div class="decor">
                    <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/key-holder/b/w/u/7-keh-9005-sndart-original-imahkz6wasv53bru.jpeg?q=70" alt="">
                    <p>Key Holders</p>
                    <p><b>Min. 50% Off</b></p>
                </div>
                <div class="decor">
                    <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/wall-clock/y/i/h/high-quality-quartz-decorative-classic-wall-clock-20-mt1202-20cm-original-imahhyg6hapzp6vx.jpeg?q=70" alt="">
                    <p>Wall Clocks</p>
                    <p><b>Min. 50% Off</b></p>
                </div>
                <div class="decor">
                    <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/mosquito-net/l/r/h/double-bed-double-and-king-size-bed-6x6-6-5x6-5-7x7-ft-78-tent-original-imaha6dhyeudhuyd.jpeg?q=70" alt="">
                    <p>Mosquito Nets</p>
                    <p><b>Min. 50% Off</b></p>
                </div>
                <div class="decor">
                    <img src="https://th.bing.com/th/id/OIP.US65wntzF1_BSzTwByitKwHaHa?w=189&h=189&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="">
                    <p>Torches</p>
                    <p><b>Specials</b></p>
                </div>
            </div>
        </section>

        <section id="spotlight">
            <h2>Brands in Spotlight</h2>
            <div class="brands">
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/c1ab32cf516ea38c.png?q=60" alt="" class="shoes">
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/515ef23fd7b0358e.png?q=60" alt="" class="shoes">
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/d0e8a80499bf845f.png?q=60" alt="" class="shoes">
            </div>
            <div class="brands">
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/6133a4197941229b.png?q=60" alt="" class="shoes">
                
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/e4b123e7157b2ea5.png?q=60" alt="" class="shoes">
                
                <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/1f06224f74b7dde6.png?q=60" alt="" class="shoes">
            </div>
        </section>
    </main>
    
</body>
</html>
